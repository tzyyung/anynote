<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>anynote — settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 24px; font-size: 14px; }
    label { display: block; margin-top: 16px; font-weight: 600; font-size: 14px; }
    input { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: ui-monospace, Menlo, monospace; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 14px; background: #3b82f6; color: white; border: 0; border-radius: 6px; cursor: pointer; }
    button:hover { background: #2563eb; }
    .status { margin-top: 12px; font-size: 13px; }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
    .hint { color: #888; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>anynote</h1>
  <div class="sub">Save links, highlights, and images to your Google Sheet.</div>

  <label for="url">Web App URL</label>
  <input id="url" placeholder="https://script.google.com/macros/s/.../exec">
  <div class="hint">From Apps Script deployment.</div>

  <label for="secret">Secret</label>
  <input id="secret" type="password" placeholder="your secret string">
  <div class="hint">The value you put in setSecret().</div>

  <button id="save">Save</button>
  <button id="test" style="background:#64748b;">Test connection</button>

  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
